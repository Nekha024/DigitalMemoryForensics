<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify OTP</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

/* CENTER */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#020617;
    overflow:hidden;
}

/* BACKGROUND (CYAN THEME) */
.bg{
    position:fixed;
    inset:0;
    z-index:-2;
    background:
        radial-gradient(circle at 20% 30%, rgba(6,182,212,.2), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(6,182,212,.2), transparent 40%),
        #020617;
    animation: moveBg 6s ease-in-out infinite alternate;
}

@keyframes moveBg{
    0%{background-position:0% 50%, 100% 50%}
    100%{background-position:100% 50%, 0% 50%}
}

/* SCAN (INSIDE STYLE MATCH) */
.scan{
    position:absolute;
    inset:0;
    pointer-events:none;
    opacity:0;
    z-index:0;
}

.scan.active{
    opacity:1;
}

.scan::after{
    content:"";
    position:absolute;
    left:0;
    right:0;
    top:-20%;
    height:40%;
    background:linear-gradient(
        to bottom,
        transparent,
        rgba(6,182,212,0.5),
        transparent
    );
    filter: blur(6px);
    animation: scanMove 4s ease-in-out;
}

@keyframes scanMove{
    0%{transform:translateY(-100%); opacity:0;}
    20%{opacity:1;}
    80%{opacity:1;}
    100%{transform:translateY(200%); opacity:0;}
}

/* CARD (GLASS + NEON) */
.card{
    width:360px;
    padding:30px;

    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);

    border:1px solid rgba(6,182,212,0.3);
    box-shadow:0 0 30px rgba(6,182,212,0.4);

    border-radius:14px;
    text-align:center;
    position:relative;
    overflow:hidden;
}

/* TEXT */
h2{
    color:#22d3ee;
    text-shadow:0 0 10px #06b6d4;
    margin-bottom:10px;
}

p{
    color:#aaa;
    font-size:14px;
    margin-bottom:20px;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    background:transparent;
    border:none;
    border-bottom:2px solid #555;
    color:white;
    text-align:center;
    letter-spacing:6px;
    font-size:20px;
    outline:none;
    transition:.3s;
}

input:focus{
    border-bottom:2px solid #06b6d4;
    box-shadow:0 5px 10px rgba(6,182,212,0.3);
}

/* BUTTON */
button{
    width:100%;
    margin-top:20px;
    padding:12px;
    border:none;
    border-radius:20px;
    background:linear-gradient(135deg,#06b6d4,#0ea5e9);
    color:white;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    box-shadow:0 0 15px #06b6d4;
}

/* MESSAGE */
.error{
    color:#ff4d4d;
    font-size:13px;
    margin-bottom:10px;
}

.success{
    color:#22c55e;
    font-size:13px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

    <!-- SCAN INSIDE CARD -->
    <div class="scan" id="scan"></div>

    <h2>OTP Verification</h2>
    <p>Enter the OTP sent to your email</p>

    {% if messages %}
        {% for message in messages %}
            <div class="{% if message.tags == 'success' %}success{% else %}error{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <input type="text" name="otp" maxlength="6" placeholder="------" required>
        <button type="submit" onclick="triggerScan()">Verify</button>
    </form>

</div>

<script>
function triggerScan(){
    const scan = document.getElementById('scan');
    scan.classList.add('active');
    setTimeout(()=>scan.classList.remove('active'),4000);
}
</script>

</body>
</html>
