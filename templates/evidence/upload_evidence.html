{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Evidence</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#020617;
    color:white;
}

/* NAVBAR */
.navbar{
    backdrop-filter: blur(10px);
    background: rgba(0,0,0,0.4);
    border-bottom:1px solid rgba(255,255,255,0.1);
}

/* GLASS */
.glass{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    border:1px solid rgba(6,182,212,0.2);
}

/* INPUT */
input, textarea, select{
    width:100%;
    padding:10px;
    margin-top:6px;
    border-radius:6px;
    background:transparent;
    border:1px solid #334155;
    color:white;
    outline:none;
}

input:focus, textarea:focus, select:focus{
    border:1px solid #06b6d4;
    box-shadow:0 0 10px rgba(6,182,212,0.3);
}

/* FILE INPUT SPECIAL */
input[type="file"]{
    padding:8px;
    border:1px dashed #06b6d4;
    cursor:pointer;
}

/* BUTTON */
.btn{
    padding:10px 18px;
    border-radius:8px;
    background:#06b6d4;
    color:white;
    transition:0.3s;
}
.btn:hover{
    background:#0891b2;
    box-shadow:0 0 10px #06b6d4;
}
</style>
</head>

<body class="pt-24 px-6">

<!-- NAVBAR -->
<header class="navbar fixed top-0 left-0 w-full z-50 flex justify-between items-center px-10 py-4">

    <h1 class="text-xl font-bold text-cyan-400">DMF System</h1>

    <nav class="flex gap-6 text-gray-300">
        <a href="{% url 'home' %}" class="hover:text-cyan-400">Dashboard</a>
    </nav>

    <span class="text-sm text-gray-400">
        {{ request.user.username }}
    </span>

</header>

<!-- FORM -->
<div class="max-w-2xl mx-auto">

    <div class="glass p-8 rounded-xl">

        <h2 class="text-2xl text-cyan-400 mb-6">
            Upload Evidence
        </h2>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            {% for field in form %}
                <div class="mb-4">
                    <label class="text-sm text-gray-300">
                        {{ field.label }}
                    </label>
                    {{ field }}

                    {% if field.errors %}
                        <p class="text-red-400 text-sm">
                            {{ field.errors }}
                        </p>
                    {% endif %}
                </div>
            {% endfor %}

            <div class="flex justify-between mt-6">

                <a href="{% url 'home' %}" 
                   class="px-4 py-2 bg-gray-700 rounded-lg hover:bg-gray-600">
                    ← Back
                </a>

                <button type="submit" class="btn">
                    Upload
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
