{% extends "base.html" %}

{% block title %}Create Case{% endblock %}

{% block content %}

<div class="max-w-2xl mx-auto">

    <div class="glass p-8 rounded-xl">

        <h2 class="text-2xl text-cyan-400 mb-6">Create New Case</h2>

        <form method="post">
            {% csrf_token %}

            {% for field in form %}
                <div class="mb-4">
                    <label class="text-gray-300 text-sm">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <p class="text-red-400 text-sm">{{ field.errors }}</p>
                    {% endif %}
                </div>
            {% endfor %}

            <div class="flex justify-between mt-6">

                <a href="{% url 'profile' %}" 
                   class="px-4 py-2 bg-gray-700 rounded-lg hover:bg-gray-600">
                    ← Back
                </a>

                <button type="submit" class="btn">
                    Save Case
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
