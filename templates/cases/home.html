{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<!-- HEADER -->
<div class="flex justify-between items-center mb-8">
    <h2 class="text-2xl text-cyan-400">My Cases</h2>

    <a href="{% url 'create_case' %}" 
       class="bg-cyan-500 px-4 py-2 rounded-lg hover:bg-cyan-600">
        + New Case
    </a>
</div>

<!-- CASE GRID -->
<div class="grid md:grid-cols-3 gap-6">

{% for case in case_list %}
    <a href="{% url 'case_detail' case.id %}">
        <div class="glass card p-6 rounded-xl">

            <h3 class="text-lg text-cyan-400 font-semibold">
                {{ case.title }}
            </h3>

            <p class="text-gray-400 text-sm mt-2">
                {{ case.description|truncatewords:10 }}
            </p>

            <div class="flex justify-between items-center mt-4 text-sm">
                <span class="text-gray-500">
                    {{ case.created_at }}
                </span>

                <span class="px-2 py-1 rounded bg-cyan-500/20 text-cyan-400">
                    {{ case.status }}
                </span>
            </div>

        </div>
    </a>
{% empty %}
    <p class="text-gray-400">No cases yet 🚀</p>
{% endfor %}

</div>

{% endblock %}
